<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VinzSnipe Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--surface:#131313;--border:#222;--green:#00c076;--red:#ff4d4d;--yellow:#f0b90b;--text:#eaecef;--muted:#5e6673;--blue:#1db1f5}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo-txt{font-size:12px;font-weight:800;letter-spacing:.5px}
.logo-txt span{color:var(--green)}
.sbox{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;flex:1;gap:4px;min-width:0}
.sbox input{background:none;border:none;outline:none;color:var(--text);font-size:11px;width:100%;min-width:0}
.sbox input::placeholder{color:var(--muted)}
.refresh-btn{background:var(--green);color:#000;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}

/* Filter tabs */
.fbar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.fbar::-webkit-scrollbar{display:none}
.ftab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.ftab.active{color:var(--green);border-bottom-color:var(--green)}

/* List */
.list{flex:1;overflow-y:auto;overflow-x:hidden}
.row{display:flex;align-items:center;gap:8px;padding:10px 8px;border-bottom:1px solid var(--border);cursor:pointer}
.row:active{background:rgba(255,255,255,.03)}
.star{color:var(--muted);font-size:16px;flex-shrink:0;width:18px;text-align:center}
.icon-wrap{position:relative;flex-shrink:0}
.tok-icon{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--border)}
.badge{position:absolute;bottom:-2px;right:-2px;width:13px;height:13px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px}
.info{flex:1;min-width:0;overflow:hidden}
.sym-row{display:flex;align-items:center;gap:4px}
.sym{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.verify{color:var(--green);font-size:10px;flex-shrink:0}
.meta-row{display:flex;align-items:center;gap:5px;margin-top:1px}
.age{font-size:10px;color:var(--muted)}
.mini-icon{font-size:9px;color:var(--muted)}

.vals{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;min-width:62px}
.price{font-size:13px;font-weight:700;white-space:nowrap}
.chg{font-size:10px;font-weight:600;margin-top:1px}
.chg.up{color:var(--green)}.chg.down{color:var(--red)}

.vals2{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;min-width:62px}
.mc{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap}
.mc-dup{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap}

.bolt{width:30px;height:30px;border-radius:50%;background:rgba(0,192,118,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green);font-size:14px}

.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px}
.load{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;gap:10px}
.spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.load-t{font-size:11px;color:var(--muted)}

/* Bottom nav */
.bnav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.bnav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;color:var(--muted);font-size:10px}
.bnav-i.active{color:var(--green)}
.bnav-i svg{width:20px;height:20px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo-txt">VINZ<span>SNIPE</span></div>
  <div class="sbox">
    <input id="search" type="text" placeholder="Cari nama / simbol / CA token...">
  </div>
  <button class="refresh-btn" onclick="loadAll()">↻</button>
</div>

<div class="fbar">
  <button class="ftab active" data-src="trending" onclick="setSource(this,'trending')">🔥 Trending</button>
  <button class="ftab" data-src="boosted" onclick="setSource(this,'boosted')">⚡ Boosted</button>
  <button class="ftab" data-src="pump" onclick="setSource(this,'pump')">🐸 Pump.fun Baru</button>
</div>

<div class="list" id="list">
  <div class="load show" id="loader">
    <div class="spin"></div>
    <div class="load-t">Memuat token...</div>
  </div>
</div>

<div class="bnav">
  <div class="bnav-i active">↗<div>Swap</div></div>
  <div class="bnav-i" onclick="location.href='index.html'">📈<div>Terminal</div></div>
  <div class="bnav-i">⚙<div>Perps</div></div>
  <div class="bnav-i">🐷<div>Lend</div></div>
  <div class="bnav-i">🔮<div>Predict</div></div>
  <div class="bnav-i">👛<div>Portfolio</div></div>
</div>

<script>
let curSource="trending";
let tokensData=[];

function fmtPrice(p){
  p=parseFloat(p)||0;
  if(p===0)return "$0";
  if(p<0.00001) return "$"+p.toFixed(8).replace(".",",");
  if(p<1) return "$"+p.toFixed(6).replace(".",",");
  return "$"+p.toFixed(2).replace(".",",");
}
function fmtMC(n){
  n=parseFloat(n)||0;
  if(n===0)return "?";
  if(n>=1e9) return "$"+(n/1e6).toFixed(1).replace(".",",")+" jt".replace("jt","M"); // billions shown as M (juta->miliar guard)
  if(n>=1e6) return "$"+(n/1e6).toFixed(1).replace(".",",")+" jt";
  if(n>=1e3) return "$"+(n/1e3).toFixed(1).replace(".",",")+" rb";
  return "$"+n.toFixed(0);
}
function fmtAge(ts){
  if(!ts)return "?";
  const diff=Date.now()-ts;
  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000);
  const m=Math.floor(diff/60000);
  if(d>0)return d+"d";
  if(h>0)return h+"h";
  if(m>0)return m+"m";
  return "now";
}

function setSource(el,src){
  document.querySelectorAll(".ftab").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  curSource=src;
  loadAll();
}

function rowHTML(t){
  const chg=t.chg||0;
  const chgClass=chg>=0?"up":"down";
  const arrow=chg>=0?"":"";
  return `<div class="row" onclick="openToken('${t.address}')">
    <span class="star">☆</span>
    <div class="icon-wrap">
      <img class="tok-icon" src="${t.icon||''}" onerror="this.style.display='none'">
      <div class="badge">${t.dexIcon||"🟢"}</div>
    </div>
    <div class="info">
      <div class="sym-row">
        <span class="sym">${t.symbol}</span>
        <span class="verify">✅</span>
      </div>
      <div class="meta-row">
        <span class="age">${t.age}</span>
        <span class="mini-icon">📝🔍</span>
      </div>
    </div>
    <div class="vals">
      <div class="price">${t.priceStr}</div>
      <div class="chg ${chgClass}">${chg>=0?"+":""}${chg.toFixed(2).replace(".",",")}%</div>
    </div>
    <div class="vals2">
      <div class="mc">${t.mcStr}</div>
      <div class="mc-dup">${t.mcStr}</div>
    </div>
    <div class="bolt">⚡</div>
  </div>`;
}

function renderList(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  let list=tokensData;
  if(q){
    list=list.filter(t=>t.symbol.toLowerCase().includes(q)||t.address.toLowerCase().includes(q));
  }
  const el=document.getElementById("list");
  if(list.length===0){
    el.innerHTML='<div class="empty">Tidak ada token ditemukan</div>';
    return;
  }
  el.innerHTML=list.map(rowHTML).join("");
}

function openToken(addr){
  window.location.href="index.html?token="+addr;
}

async function loadTrending(){
  // pakai dexscreener token-boosts/top sebagai sumber trending (token populer di Solana)
  const res=await fetch("https://api.dexscreener.com/token-boosts/top/v1");
  const data=await res.json();
  const arr=(data||[]).filter(d=>d.chainId==="solana").slice(0,40);
  return await enrichFromBoosts(arr);
}

async function loadBoosted(){
  const res=await fetch("https://api.dexscreener.com/token-boosts/latest/v1");
  const data=await res.json();
  const arr=(data||[]).filter(d=>d.chainId==="solana").slice(0,40);
  return await enrichFromBoosts(arr);
}

async function enrichFromBoosts(arr){
  const out=[];
  // ambil detail tiap token via dexscreener token endpoint (batch kecil agar tidak rate-limit)
  for(const item of arr){
    try{
      const r=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+item.tokenAddress);
      const d=await r.json();
      const pairs=d.pairs;
      if(!pairs||pairs.length===0)continue;
      const pair=pairs.sort((x,y)=>(y.liquidity?.usd||0)-(x.liquidity?.usd||0))[0];
      out.push({
        address:item.tokenAddress,
        symbol:pair.baseToken?.symbol||"?",
        icon:pair.info?.imageUrl||item.icon||"",
        priceStr:fmtPrice(pair.priceUsd),
        chg:pair.priceChange?.h24||0,
        mcStr:fmtMC(pair.marketCap||pair.fdv),
        age:fmtAge(pair.pairCreatedAt),
        dexIcon:"🟢"
      });
    }catch(e){}
  }
  return out;
}

async function loadPump(){
  // pump.fun frontend api (mungkin terblokir CORS pada beberapa browser/jaringan)
  try{
    const r=await fetch("https://frontend-api-v3.pump.fun/coins?offset=0&limit=40&sort=created_timestamp&order=DESC&includeNsfw=false");
    const data=await r.json();
    return (data||[]).map(c=>({
      address:c.mint,
      symbol:c.symbol||"?",
      icon:c.image_uri||"",
      priceStr:fmtPrice(c.usd_market_cap&&c.total_supply? (c.usd_market_cap/c.total_supply):0),
      chg:0,
      mcStr:fmtMC(c.usd_market_cap),
      age:fmtAge(c.created_timestamp?c.created_timestamp*1000:0),
      dexIcon:"🐸"
    }));
  }catch(e){
    return [];
  }
}

async function loadAll(){
  document.getElementById("list").innerHTML='<div class="load show"><div class="spin"></div><div class="load-t">Memuat token...</div></div>';
  try{
    let data=[];
    if(curSource==="trending") data=await loadTrending();
    else if(curSource==="boosted") data=await loadBoosted();
    else if(curSource==="pump") data=await loadPump();
    tokensData=data;
    renderList();
  }catch(e){
    document.getElementById("list").innerHTML='<div class="empty">Gagal memuat data. Cek koneksi atau coba sumber lain.<br>('+e.message+')</div>';
  }
}

document.getElementById("search").addEventListener("input",renderList);
loadAll();
</script>
</body>
</html>
