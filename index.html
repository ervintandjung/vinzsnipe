<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VinzSnipe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--surface:#131313;--border:#222;--green:#00c076;--red:#ff4d4d;--yellow:#f0b90b;--text:#eaecef;--muted:#5e6673;--blue:#1db1f5}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* PAGES */
.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.active{display:flex}

/* Header */
.hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo-txt{font-size:12px;font-weight:800;letter-spacing:.5px}
.logo-txt span{color:var(--green)}
.sbox{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;flex:1;gap:4px;min-width:0}
.sbox input{background:none;border:none;outline:none;color:var(--text);font-size:11px;width:100%;min-width:0}
.sbox input::placeholder{color:var(--muted)}
.refresh-btn{background:var(--green);color:#000;border:none;border-radius:6px;padding:6px 10px;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0}

/* Filter tabs */
.fbar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.fbar::-webkit-scrollbar{display:none}
.ftab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.ftab.active{color:var(--green);border-bottom-color:var(--green)}

/* List */
.list{flex:1;overflow-y:auto;overflow-x:hidden}
.row{display:flex;align-items:center;gap:8px;padding:10px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.row:active{background:rgba(255,255,255,.05)}
.star{color:var(--muted);font-size:16px;flex-shrink:0;width:18px;text-align:center}
.icon-wrap{position:relative;flex-shrink:0}
.tok-icon{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--border)}
.badge{position:absolute;bottom:-2px;right:-2px;width:13px;height:13px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px}
.info{flex:1;min-width:0;overflow:hidden}
.sym-row{display:flex;align-items:center;gap:4px}
.sym{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.verify{color:var(--green);font-size:10px;flex-shrink:0}
.meta-row{display:flex;align-items:center;gap:5px;margin-top:1px}
.age{font-size:10px;color:var(--muted)}
.mini-icon{font-size:9px;color:var(--muted)}
.vals{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;min-width:62px}
.price{font-size:13px;font-weight:700;white-space:nowrap}
.chg{font-size:10px;font-weight:600;margin-top:1px}
.chg.up{color:var(--green)}.chg.down{color:var(--red)}
.vals2{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;min-width:62px}
.mc{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap}
.mc-dup{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap}
.bolt{width:30px;height:30px;border-radius:50%;background:rgba(0,192,118,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green);font-size:14px}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px}
.load{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;gap:10px}
.spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.load-t{font-size:11px;color:var(--muted)}

/* ---- CHART PAGE ---- */
#chartPage{background:var(--bg)}

.chart-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:2px 6px;flex-shrink:0}
.chart-tok-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.chart-tok-icon{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--border);flex-shrink:0}
.chart-tok-name{font-size:14px;font-weight:800}
.chart-tok-sub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.chart-mc-wrap{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
.chart-mc{font-size:15px;font-weight:800;color:var(--text)}
.chart-price-live{font-size:11px;color:var(--green);margin-top:1px}
.home-btn{background:rgba(255,255,255,.08);border:none;border-radius:6px;padding:6px 10px;color:var(--text);font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}

/* Badges row */
.badge-row{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);flex-wrap:wrap;flex-shrink:0}
.bdg{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.bdg-green{background:rgba(0,192,118,.15);color:var(--green)}
.bdg-blue{background:rgba(29,177,245,.15);color:var(--blue)}
.bdg-red{background:rgba(255,77,77,.15);color:var(--red)}
.bdg-gray{background:rgba(255,255,255,.07);color:var(--muted)}
.top10{font-size:10px;color:var(--muted);margin-left:auto}

/* Timeframe changes */
.tf-chg-row{display:flex;gap:6px;padding:6px 10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tf-chg-row::-webkit-scrollbar{display:none}
.tf-chg{background:rgba(0,192,118,.1);border-radius:6px;padding:5px 10px;text-align:center;flex-shrink:0}
.tf-chg .tf-label{font-size:10px;color:var(--muted)}
.tf-chg .tf-val{font-size:12px;font-weight:700;color:var(--green);margin-top:2px}
.tf-chg .tf-val.down{color:var(--red)}
.tf-chg .tf-val.up{color:var(--green)}

/* Stats bar */
.stats-bar{display:flex;gap:0;padding:0;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat{padding:7px 10px;border-right:1px solid var(--border);flex-shrink:0}
.stat-label{font-size:9px;color:var(--muted)}
.stat-val{font-size:11px;font-weight:700;margin-top:2px;white-space:nowrap}
.stat-val.buy{color:var(--green)}.stat-val.sell{color:var(--red)}

/* Chart iframe */
.chart-frame-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.chart-iframe{width:100%;height:100%;border:none;display:block}

/* Trade tabs & content */
.trade-tabs{display:flex;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.trade-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.trade-tab.active{color:var(--green);border-bottom-color:var(--green)}

.trade-content{flex-shrink:0;background:var(--bg);padding:10px;display:none;max-height:140px;overflow-y:auto}
.trade-content.active{display:block}
.no-data{text-align:center;color:var(--muted);font-size:11px;padding:16px}

/* Buy/Sell */
.buy-sell-bar{display:flex;gap:8px;padding:8px 10px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.buy-btn{flex:1;background:var(--green);color:#000;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer}
.sell-btn{flex:1;background:var(--red);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer}
.dex-btn{background:rgba(255,255,255,.07);color:var(--text);border:none;border-radius:10px;padding:13px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>

<!-- ===== LIST PAGE ===== -->
<div class="page active" id="listPage">
  <div class="hdr">
    <div class="logo-txt">VINZ<span>SNIPE</span></div>
    <div class="sbox">
      <input id="search" type="text" placeholder="Cari nama / simbol / CA token...">
    </div>
    <button class="refresh-btn" onclick="loadAll()">↻</button>
  </div>
  <div class="fbar">
    <button class="ftab active" data-src="trending" onclick="setSource(this,'trending')">🔥 Trending</button>
    <button class="ftab" data-src="boosted" onclick="setSource(this,'boosted')">⚡ Boosted</button>
    <button class="ftab" data-src="pump" onclick="setSource(this,'pump')">🐸 Pump.fun Baru</button>
  </div>
  <div class="list" id="list">
    <div class="load"><div class="spin"></div><div class="load-t">Memuat token...</div></div>
  </div>
</div>

<!-- ===== CHART PAGE ===== -->
<div class="page" id="chartPage">
  <!-- Header with back + token info + Home button -->
  <div class="chart-hdr">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="chart-tok-info">
      <img class="chart-tok-icon" id="ct-icon" src="" onerror="this.style.display='none'">
      <div>
        <div class="chart-tok-name" id="ct-name">-</div>
        <div class="chart-tok-sub" id="ct-addr">-</div>
      </div>
    </div>
    <div class="chart-mc-wrap">
      <div class="chart-mc" id="ct-mc">-</div>
      <div class="chart-price-live" id="ct-price-live">-</div>
    </div>
    <button class="home-btn" onclick="goHome()">🏠 Home</button>
  </div>

  <!-- Badges -->
  <div class="badge-row" id="ct-badges">
    <span class="bdg bdg-green">Name ✓</span>
    <span class="bdg bdg-green">CA ✓</span>
    <span class="bdg bdg-green">DEV ✓</span>
    <span class="bdg bdg-gray">X ✓</span>
    <span class="bdg bdg-gray">🌐 ✓</span>
    <span class="top10" id="ct-top10">Top10: 0.0%</span>
  </div>

  <!-- Timeframe % changes -->
  <div class="tf-chg-row" id="ct-tfchanges">
    <div class="tf-chg"><div class="tf-label">1m</div><div class="tf-val" id="tf1m">-</div></div>
    <div class="tf-chg"><div class="tf-label">5m</div><div class="tf-val" id="tf5m">-</div></div>
    <div class="tf-chg"><div class="tf-label">1h</div><div class="tf-val" id="tf1h">-</div></div>
    <div class="tf-chg"><div class="tf-label">24h</div><div class="tf-val" id="tf24h">-</div></div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat"><div class="stat-label">Liquidity</div><div class="stat-val" id="ct-liq">-</div></div>
    <div class="stat"><div class="stat-label">Volume 24h</div><div class="stat-val" id="ct-vol">-</div></div>
    <div class="stat"><div class="stat-label">Buy/Sell</div><div class="stat-val"><span class="buy" id="ct-buys">-</span>/<span class="sell" id="ct-sells">-</span></div></div>
    <div class="stat"><div class="stat-label">Supply</div><div class="stat-val" id="ct-supply">-</div></div>
    <div class="stat"><div class="stat-label">Rugpull</div><div class="stat-val" id="ct-rug" style="color:var(--green)">-</div></div>
  </div>

  <!-- Chart -->
  <div class="chart-frame-wrap">
    <iframe class="chart-iframe" id="chartIframe" src="" allowfullscreen></iframe>
  </div>

  <!-- Trade tabs -->
  <div class="trade-tabs">
    <div class="trade-tab active" onclick="switchTradeTab(this,'trades')">Trades</div>
    <div class="trade-tab" onclick="switchTradeTab(this,'holders')">Holders</div>
    <div class="trade-tab" onclick="switchTradeTab(this,'devinfo')">Dev Info</div>
  </div>
  <div class="trade-content active" id="tab-trades">
    <div class="no-data" id="trades-body">Memuat trades...</div>
  </div>
  <div class="trade-content" id="tab-holders"><div class="no-data">Data holders tidak tersedia via API publik.</div></div>
  <div class="trade-content" id="tab-devinfo"><div class="no-data" id="devinfo-body">-</div></div>

  <!-- Buy/Sell -->
  <div class="buy-sell-bar">
    <button class="buy-btn" onclick="openDex('buy')">🟢 BUY</button>
    <button class="sell-btn" onclick="openDex('sell')">🔴 SELL</button>
    <button class="dex-btn" onclick="openDex('dex')">🔗 DEX</button>
  </div>
</div>

<script>
let curSource="trending";
let tokensData=[];
let curToken=null;
let priceInterval=null;

/* ---- FORMAT HELPERS ---- */
function fmtPrice(p){
  p=parseFloat(p)||0;
  if(p===0)return "$0";
  if(p<0.00001)return "$"+p.toFixed(8).replace(".",",");
  if(p<1)return "$"+p.toFixed(6).replace(".",",");
  return "$"+p.toFixed(2).replace(".",",");
}
function fmtMC(n){
  n=parseFloat(n)||0;
  if(n===0)return "?";
  if(n>=1e9)return "$"+(n/1e9).toFixed(1)+" M";
  if(n>=1e6)return "$"+(n/1e6).toFixed(1)+" jt";
  if(n>=1e3)return "$"+(n/1e3).toFixed(1)+" rb";
  return "$"+n.toFixed(0);
}
function fmtAge(ts){
  if(!ts)return "?";
  const diff=Date.now()-ts;
  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000);
  const m=Math.floor(diff/60000);
  if(d>0)return d+"d";
  if(h>0)return h+"h";
  if(m>0)return m+"m";
  return "now";
}
function fmtChg(v){
  v=parseFloat(v)||0;
  return (v>=0?"+":"")+v.toFixed(2)+"%";
}

/* ---- LIST PAGE ---- */
function setSource(el,src){
  document.querySelectorAll(".ftab").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  curSource=src;
  loadAll();
}

function rowHTML(t){
  const chg=t.chg||0;
  const chgClass=chg>=0?"up":"down";
  return `<div class="row" onclick="openToken(${JSON.stringify(JSON.stringify(t))})">
    <span class="star">☆</span>
    <div class="icon-wrap">
      <img class="tok-icon" src="${t.icon||''}" onerror="this.style.display='none'">
      <div class="badge">${t.dexIcon||"🟢"}</div>
    </div>
    <div class="info">
      <div class="sym-row">
        <span class="sym">${t.symbol}</span>
        <span class="verify">✅</span>
      </div>
      <div class="meta-row">
        <span class="age">${t.age}</span>
        <span class="mini-icon">📝🔍</span>
      </div>
    </div>
    <div class="vals">
      <div class="price">${t.priceStr}</div>
      <div class="chg ${chgClass}">${chg>=0?"+":""}${chg.toFixed(2)}%</div>
    </div>
    <div class="vals2">
      <div class="mc">${t.mcStr}</div>
      <div class="mc-dup">${t.mcStr}</div>
    </div>
    <div class="bolt">⚡</div>
  </div>`;
}

function renderList(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  let list=tokensData;
  if(q) list=list.filter(t=>t.symbol.toLowerCase().includes(q)||t.address.toLowerCase().includes(q));
  const el=document.getElementById("list");
  if(list.length===0){el.innerHTML='<div class="empty">Tidak ada token ditemukan</div>';return;}
  el.innerHTML=list.map(rowHTML).join("");
}

/* ---- TOKEN OPEN (from list) ---- */
function openToken(tJson){
  const t=JSON.parse(tJson);
  curToken=t;
  showChartPage(t);
}

/* ---- CHART PAGE ---- */
function showChartPage(t){
  document.getElementById("listPage").classList.remove("active");
  document.getElementById("chartPage").classList.add("active");

  // Header
  document.getElementById("ct-icon").src=t.icon||"";
  document.getElementById("ct-name").textContent=t.symbol;
  document.getElementById("ct-addr").textContent=t.address.slice(0,14)+"..."+t.address.slice(-6);
  document.getElementById("ct-mc").textContent=t.mcStr||"-";
  document.getElementById("ct-price-live").textContent=t.priceStr||"-";

  // Stats placeholder
  document.getElementById("ct-liq").textContent="-";
  document.getElementById("ct-vol").textContent="-";
  document.getElementById("ct-buys").textContent="-";
  document.getElementById("ct-sells").textContent="-";
  document.getElementById("ct-supply").textContent="-";
  document.getElementById("ct-rug").textContent="-";

  // TF changes
  document.getElementById("tf1m").textContent="-";
  document.getElementById("tf5m").textContent="-";
  document.getElementById("tf1h").textContent="-";
  document.getElementById("tf24h").textContent="-";

  // Default trades
  document.getElementById("trades-body").textContent="Memuat trades...";
  document.getElementById("devinfo-body").textContent="-";

  // Chart via dexscreener embed (clean, no duplicate UI)
  const iframe=document.getElementById("chartIframe");
  iframe.src="https://dexscreener.com/solana/"+t.address+"?embed=1&theme=dark&info=0&trades=0";

  // Fetch live data
  fetchLiveData(t.address);

  // Start live price update every 15s
  if(priceInterval) clearInterval(priceInterval);
  priceInterval=setInterval(()=>fetchLiveData(t.address),15000);
}

async function fetchLiveData(addr){
  try{
    const r=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+addr);
    const d=await r.json();
    const pairs=d.pairs;
    if(!pairs||pairs.length===0)return;
    const pair=pairs.sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0))[0];

    // Price & MC live update
    const price=fmtPrice(pair.priceUsd);
    const mc=fmtMC(pair.marketCap||pair.fdv);
    document.getElementById("ct-price-live").textContent=price;
    document.getElementById("ct-mc").textContent=mc;

    // Stats
    document.getElementById("ct-liq").textContent=fmtMC(pair.liquidity?.usd);
    document.getElementById("ct-vol").textContent=fmtMC(pair.volume?.h24);
    document.getElementById("ct-buys").textContent=pair.txns?.h24?.buys||"-";
    document.getElementById("ct-sells").textContent=pair.txns?.h24?.sells||"-";
    document.getElementById("ct-supply").textContent="1.00B";
    document.getElementById("ct-rug").textContent="RENDAH";

    // TF changes
    const pc=pair.priceChange||{};
    setTf("tf1m",pc.m1);
    setTf("tf5m",pc.m5);
    setTf("tf1h",pc.h1);
    setTf("tf24h",pc.h24);

    // Dev info
    const base=pair.baseToken;
    document.getElementById("devinfo-body").textContent=
      "Nama: "+(base?.name||"-")+"\nSimbol: "+(base?.symbol||"-")+"\nCA: "+(base?.address||"-")+"\nDEX: "+(pair.dexId||"-")+"\nPair: "+(pair.pairAddress||"-");

  }catch(e){}
}

function setTf(id,val){
  const el=document.getElementById(id);
  if(!el)return;
  const v=parseFloat(val)||0;
  el.textContent=fmtChg(v);
  el.className="tf-val "+(v>=0?"up":"down");
}

function goHome(){
  if(priceInterval){clearInterval(priceInterval);priceInterval=null;}
  document.getElementById("chartIframe").src="";
  document.getElementById("chartPage").classList.remove("active");
  document.getElementById("listPage").classList.add("active");
}

function switchTradeTab(el,name){
  document.querySelectorAll(".trade-tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".trade-content").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
}

function openDex(action){
  if(!curToken)return;
  window.open("https://dexscreener.com/solana/"+curToken.address,"_blank");
}

/* ---- API LOADING ---- */
async function loadTrending(){
  const res=await fetch("https://api.dexscreener.com/token-boosts/top/v1");
  const data=await res.json();
  const arr=(data||[]).filter(d=>d.chainId==="solana").slice(0,40);
  return await enrichFromBoosts(arr);
}
async function loadBoosted(){
  const res=await fetch("https://api.dexscreener.com/token-boosts/latest/v1");
  const data=await res.json();
  const arr=(data||[]).filter(d=>d.chainId==="solana").slice(0,40);
  return await enrichFromBoosts(arr);
}
async function enrichFromBoosts(arr){
  const out=[];
  for(const item of arr){
    try{
      const r=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+item.tokenAddress);
      const d=await r.json();
      const pairs=d.pairs;
      if(!pairs||pairs.length===0)continue;
      const pair=pairs.sort((x,y)=>(y.liquidity?.usd||0)-(x.liquidity?.usd||0))[0];
      out.push({
        address:item.tokenAddress,
        symbol:pair.baseToken?.symbol||"?",
        icon:pair.info?.imageUrl||item.icon||"",
        priceStr:fmtPrice(pair.priceUsd),
        priceUsd:pair.priceUsd,
        chg:pair.priceChange?.h24||0,
        mcStr:fmtMC(pair.marketCap||pair.fdv),
        age:fmtAge(pair.pairCreatedAt),
        dexIcon:"🟢"
      });
    }catch(e){}
  }
  return out;
}
async function loadPump(){
  try{
    const r=await fetch("https://frontend-api-v3.pump.fun/coins?offset=0&limit=40&sort=created_timestamp&order=DESC&includeNsfw=false");
    const data=await r.json();
    return (data||[]).map(c=>({
      address:c.mint,
      symbol:c.symbol||"?",
      icon:c.image_uri||"",
      priceStr:fmtPrice(c.usd_market_cap&&c.total_supply?(c.usd_market_cap/c.total_supply):0),
      chg:0,
      mcStr:fmtMC(c.usd_market_cap),
      age:fmtAge(c.created_timestamp?c.created_timestamp*1000:0),
      dexIcon:"🐸"
    }));
  }catch(e){return [];}
}
async function loadAll(){
  document.getElementById("list").innerHTML='<div class="load"><div class="spin"></div><div class="load-t">Memuat token...</div></div>';
  try{
    let data=[];
    if(curSource==="trending") data=await loadTrending();
    else if(curSource==="boosted") data=await loadBoosted();
    else if(curSource==="pump") data=await loadPump();
    tokensData=data;
    renderList();
  }catch(e){
    document.getElementById("list").innerHTML='<div class="empty">Gagal memuat data. Cek koneksi.<br>('+e.message+')</div>';
  }
}

document.getElementById("search").addEventListener("input",renderList);

/* ---- AUTO OPEN FROM URL PARAM ---- */
/* Support: index.html?token=ADDRESS  or  index.html?t=ADDRESS */
async function checkUrlToken(){
  const params=new URLSearchParams(window.location.search);
  const addr=params.get("token")||params.get("t")||params.get("ca");
  if(!addr)return false;

  // Show chart page immediately with loading state
  const placeholder={
    address:addr,
    symbol:"Loading...",
    icon:"",
    priceStr:"-",
    chg:0,
    mcStr:"-",
    age:"-",
    dexIcon:"🟢"
  };
  showChartPage(placeholder);

  // Fetch real data for this specific address
  try{
    const r=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+addr);
    const d=await r.json();
    const pairs=d.pairs;
    if(pairs&&pairs.length>0){
      const pair=pairs.sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0))[0];
      const t={
        address:addr,
        symbol:pair.baseToken?.symbol||"?",
        icon:pair.info?.imageUrl||"",
        priceStr:fmtPrice(pair.priceUsd),
        priceUsd:pair.priceUsd,
        chg:pair.priceChange?.h24||0,
        mcStr:fmtMC(pair.marketCap||pair.fdv),
        age:fmtAge(pair.pairCreatedAt),
        dexIcon:"🟢"
      };
      curToken=t;
      document.getElementById("ct-name").textContent=t.symbol;
      document.getElementById("ct-icon").src=t.icon;
      document.getElementById("ct-mc").textContent=t.mcStr;
      document.getElementById("ct-price-live").textContent=t.priceStr;
      // Update live data (stats/tf)
      fetchLiveData(addr);
    }
  }catch(e){}
  return true;
}

async function init(){
  const hasToken=await checkUrlToken();
  if(!hasToken) loadAll();
}

init();
</script>
